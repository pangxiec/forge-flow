server:
  port: 8080

spring:
  application:
    name: forge-flow-api-admin
  profiles:
    active: dev
  datasource:
    url: ${DATASOURCE_URL:}
    username: ${DATASOURCE_USERNAME:push}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.forgeflow.dao.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

forge-flow:
  gitea:
    base-url:
    token:
  llm:
    provider: ${FORGE_FLOW_LLM_PROVIDER:bailian}
    api-key: ${FORGE_FLOW_LLM_API_KEY:}
    model: ${FORGE_FLOW_LLM_MODEL:qwen-plus}
    base-url: ${FORGE_FLOW_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-seconds: ${FORGE_FLOW_LLM_TIMEOUT_SECONDS:180}
    max-retries: ${FORGE_FLOW_LLM_MAX_RETRIES:1}
  minio:
    endpoint:
    access-key:
    secret-key:
