server:
  port: 8080

spring:
  application:
    name: forge-flow-api-admin
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/forge_flow?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.forgeflow.dao.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

forge-flow:
  gitea:
    base-url:
    token:
  llm:
    provider:
    api-key:
  minio:
    endpoint:
    access-key:
    secret-key:
